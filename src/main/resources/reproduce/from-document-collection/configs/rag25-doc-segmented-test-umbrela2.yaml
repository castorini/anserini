---
corpus: msmarco-v2.1-doc-segmented
corpus_path: collections/msmarco/msmarco_v2.1_doc_segmented/

index_path: indexes/lucene-inverted.msmarco-v2.1-doc-segmented/
collection_class: MsMarcoV2DocCollection
generator_class: DefaultLuceneDocumentGenerator
index_threads: 24
index_options: -storeRaw
index_stats:
  documents: 113520750
  documents (non-empty): 113520750
  total terms: 22707699649

metrics:
  - metric: nDCG@30
    command: bin/trec_eval
    params: -c -m ndcg_cut.30
    separator: "\t"
    parse_index: 2
    metric_precision: 4
    can_combine: false
  - metric: nDCG@100
    command: bin/trec_eval
    params: -c -m ndcg_cut.100
    separator: "\t"
    parse_index: 2
    metric_precision: 4
    can_combine: false
  - metric: R@100
    command: bin/trec_eval
    params: -c -m recall.100
    separator: "\t"
    parse_index: 2
    metric_precision: 4
    can_combine: false

topic_reader: JsonString
topics:
  - name: "RAG 25: Test queries"
    id: rag25.test
    path: topics.rag25.test.jsonl
    qrel: qrels.rag25.test-umbrela2.txt

models:
