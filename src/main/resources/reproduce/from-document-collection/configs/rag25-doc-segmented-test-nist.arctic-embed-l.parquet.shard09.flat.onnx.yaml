---
corpus: msmarco-v2.1-doc-segmented-shard09.arctic-embed-l
corpus_path: collections/msmarco/msmarco_v2.1_doc_segmented.arctic-embed-l/shard09

index_path: indexes/lucene-flat.msmarco-v2.1-doc-segmented-shard09.arctic-embed-l
index_type: flat
collection_class: ParquetDenseVectorCollection
generator_class: DenseVectorDocumentGenerator
index_threads: 6
index_options: -docidField doc_id -vectorField embedding -normalizeVectors

metrics:
  - metric: nDCG@30
    command: bin/trec_eval
    params: -c -m ndcg_cut.30
    separator: "\t"
    parse_index: 2
    metric_precision: 4
    can_combine: false
  - metric: nDCG@100
    command: bin/trec_eval
    params: -c -m ndcg_cut.100
    separator: "\t"
    parse_index: 2
    metric_precision: 4
    can_combine: false
  - metric: R@100
    command: bin/trec_eval
    params: -c -m recall.100
    separator: "\t"
    parse_index: 2
    metric_precision: 4
    can_combine: false

topic_reader: JsonString
topics:
  - name: "RAG 25: Test queries"
    id: rag25.test
    path: topics.rag25.test.jsonl
    qrel: qrels.rag25.test.txt

models:
  - name: arctic-embed-l-flat-onnx
    display: ArcticEmbedL
    type: flat
    params: -topics rag25.test -topicReader JsonString -topicField title -encoder ArcticEmbedLEncoder
    results:
      nDCG@30:
        - 0.2078
      nDCG@100:
        - 0.1355
      R@100:
        - 0.0413
